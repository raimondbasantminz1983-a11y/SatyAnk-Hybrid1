    .widget{

   margin-top:15px;

.glass-card{    
    background: var(--glass);    
    border: 1.5px solid rgba(212, 175, 55, 0.3);    
    border-radius: 25px;    
    padding: 15px;    
    display: flex;    
    flex-direction: column;    
    align-items: center;    
    backdrop-filter: blur(10px);    
    margin-bottom: 15px;    
    position: relative;    
    touch-action:none;    
   animation:    
glowBox 2s infinite alternate;    
    
    will-change: transform;    
    transition: transform 0.2s linear;    
}    
     
@keyframes floatBox{    
    
0%{    
transform: translateY(0px);    
}    
    
50%{    
transform: translateY(-10px);    
}    
    
100%{    
transform: translateY(0px);    
}    
    
}    
    
@keyframes glowBox{    
    
from{    
box-shadow: 0 0 10px rgba(212,175,55,0.2);    
}    
    
to{    
box-shadow: 0 0 30px rgba(212,175,55,0.7);    
}    
    
}

<script>    
    
      let bill = [];

let micEnabled =
localStorage.getItem("SATYANK_MIC") === "ON";

let recognition;
 document.getElementById('custN').value = "";
document.getElementById('custI').value = "";
let history = JSON.parse(localStorage.getItem("SatyAnk_L_v63")) || []; let isLocked = true; let payMode = "Cash";    
    
    function changeAppTitle(newTitle) { if(!newTitle) newTitle = "SatyAnk Shop OS"; document.getElementById("appTitle").innerText = newTitle; localStorage.setItem("SatyAnk_CustomTitle", newTitle); }    
       
 function startVoice(){

    if(micEnabled){

        micEnabled = false;

        localStorage.setItem(
            "SATYANK_MIC",
            "OFF"
        );

        if(recognition){
            recognition.stop();
        }

        document.getElementById("micBtn").innerText =
        "🎤 MIC OFF";

        return;
    }

    micEnabled = true;

    localStorage.setItem(
        "SATYANK_MIC",
        "ON"
    );

    document.getElementById("micBtn").innerText =
    "🎙️ MIC ON";

    recognition = new (
        window.SpeechRecognition ||
        window.webkitSpeechRecognition
    )();

    recognition.lang = 'hi-IN';

    recognition.continuous = true;

    recognition.interimResults = false;

    recognition.onresult = (e) => {

        let s =
        e.results[e.results.length - 1][0]
        .transcript
        .toLowerCase();

        let nums = s.match(/\d+/g);

        if(!nums) return;

        let rate = nums[nums.length - 1];

        document.getElementById('mRate').value =
        rate;

        if(
            s.includes("किलो") ||
            s.includes("kg") ||
            s.includes("ग्राम") ||
            s.includes("लीटर")
        ){

            document.getElementById('mWeight').value =
            nums[0];

            document.getElementById('mPiece').value =
            "";

        }

        else if(
            s.includes("पीस") ||
            s.includes("piece") ||
            s.includes("pc")
        ){

            document.getElementById('mPiece').value =
            nums[0];

            document.getElementById('mWeight').value =
            "";

        }

        let cleanName = s
        .replace(/\d+/g,'')
        .replace(/किलो|kg|ग्राम|gm|लीटर|liter|पीस|piece|pc/g,'')
        .trim();

        document.getElementById('mName').value =
        cleanName;

        if(cleanName && rate){

            setTimeout(()=>{

                manualAdd();

            },300);
        }
    };

    recognition.onend = () => {

        if(micEnabled){

            recognition.start();
        }
    };

    recognition.start();
}


function shareApp(){

    const appLink = window.location.href;

    if(navigator.share){

        navigator.share({
            title: "SatyAnk Shop OS",
            text: "यह बिलिंग और सामान सिस्टम चलाइए",
            url: appLink
        });

    }else{

        navigator.clipboard.writeText(appLink);

        alert("App link copy हो गया");
    }
}


    function manualAdd() {    
        const n = document.getElementById('mName').value.trim();    
        const w = parseFloat(document.getElementById('mWeight').value) || 0;    
        const pc = parseFloat(document.getElementById('mPiece').value) || 0;    
        const r = parseFloat(document.getElementById('mRate').value) || 0;    
        if (n && (w > 0 || pc > 0)) {    
           bill.unshift({    
    n,    
    w,    
    pc,    
    r,    
    t: (w * r) + (pc * r),    
    time: Date.now()    
});    
            document.getElementById('mName').value=""; document.getElementById('mWeight').value=""; document.getElementById('mPiece').value=""; document.getElementById('mRate').value=""; render();    
        }    
    }    
    
    function render() {    
        const list = document.getElementById("listArea"); const sVal = document.getElementById("sInp").value.toLowerCase(); list.innerHTML = ""; let tC = 0, tW = 0, tP = 0;    
        bill.forEach((it, index) => {    
            if (sVal && !it.n.toLowerCase().includes(sVal)) return;    
            tC += it.t; tW += it.w; tP += it.pc;    
            list.innerHTML += `<div class="item-card"><div><b>${it.n}</b><br><small>${it.w > 0 ? it.w.toFixed(3)+'kg ' : ''}${it.pc > 0 ? it.pc+'pc' : ''} @₹${it.r}</small></div><div style="display:flex; align-items:center; gap:10px;"><b>₹${it.t.toFixed(0)}</b><span onclick="deleteItem(${index})" style="color:#444;cursor:pointer;">✕</span></div></div>`;    
        });    
        document.getElementById("statPay").innerText = "₹ " + tC.toFixed(0);    
        document.getElementById("statW").innerText = tW.toFixed(3) + " kg";    
        document.getElementById("statP").innerText = tP + " pc";    
        updateLedgerStats();    
    }    
   
 function finalize() {    
    const name = document.getElementById('custN').value.trim();    
    
    if(!name || bill.length === 0) 
        return alert("विवरण भरें");    
    
    history.unshift({ 
        id: Date.now(), 
        c: name, 
        i: [...bill], 
        t: bill.reduce((s,i)=>s+i.t,0), 
        m: payMode, 
        d: new Date().toLocaleString(), 
        month: new Date().getMonth() 
    });    
    
    localStorage.setItem("SatyAnk_L_v63", JSON.stringify(history));    
    
    alert("A-JUDGE: TRUE | सत्य की मुहर लगी!");     
    
    bill = [];    
    
    document.getElementById('custN').value = "";
    document.getElementById('custI').value = "";
  
   render(); 
    renderHistory(); 
    showPage(1);    
}

    function updateLedgerStats() {    
        let tw = 0, tp = 0; const currentMonth = new Date().getMonth();    
        history.forEach(h => { if(h.month === currentMonth) { h.i.forEach(item => { tw += (item.w || 0); tp += (item.pc || 0); }); } });    
        document.getElementById("ledW").innerText = tw.toFixed(3) + " kg";    
        document.getElementById("ledP").innerText = tp + " pc";    
    }    
    
    function renderHistory() {    
        const list = document.getElementById("historyList"); list.innerHTML = "";    
        history.forEach(h => { list.innerHTML += `<div class="history-card"><b>${h.c}</b> <b style="float:right; color:var(--gold);">₹${h.t.toFixed(0)}</b><br><small>${h.d} | ID: ${h.i[0].n}...</small></div>`; });    
        updateLedgerStats();    
    }    
    
    function deleteItem(i) { bill.splice(i, 1); render(); }    
    function showPage(n) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById('page'+n).classList.add('active'); document.getElementById('nav'+n).classList.add('active'); }    
    function setPay(m) { payMode = m; document.getElementById('p_cash').classList.remove('active'); document.getElementById('p_debt').classList.remove('active'); document.getElementById('p_'+m.toLowerCase()).classList.add('active'); }    
    function upBG(e) { const r = new FileReader(); r.onload = (ev) => { document.body.style.backgroundImage = `url(${ev.target.result})`; localStorage.setItem('S_BG', ev.target.result); }; r.readAsDataURL(e.target.files[0]); }    
    function togglePanel(){    
    
    let panel = document.getElementById('builderPanel');    
    let btn = document.getElementById('showPanelBtn');    
    
    if(panel.style.display === "none"){    
    
        panel.style.display = "flex";    
        btn.style.display = "none";    
    
    }else{    
    
        panel.style.display = "none";    
        btn.style.display = "block";    
    
    }    
    
}    
 function toggleLock(){    
    
isLocked = !isLocked;    
    
const btn = document.getElementById('lockBtn');    
    
 if(isLocked){

btn.innerText = "🔓 UNLOCK";
btn.style.background = "var(--red)";
  
document.querySelectorAll('.widget').forEach(w=>{    
w.classList.remove('unlocked');    
});    
    
}else{    
  btn.innerText = "🔒 LOCK";
btn.style.background = "var(--green)";  
   
  
document.querySelectorAll('.widget').forEach(w=>{    
w.classList.add('unlocked');    
});    
    
}    
    
}    
        
   
    interact('.widget').draggable({ listeners: { move(event) { if (isLocked) return; let t = event.target; let x = (parseFloat(t.getAttribute('data-x')) || 0) + event.dx; let y = (parseFloat(t.getAttribute('data-y')) || 0) + event.dy; t.style.transform = `translate(${x}px, ${y}px)`; t.setAttribute('data-x', x); t.setAttribute('data-y', y); localStorage.setItem(t.id, JSON.stringify({x, y})); }}});    
    
    window.onload = () => { document.getElementById('custN').value = "";
document.getElementById('custI').value = "";
        let st = localStorage.getItem("SatyAnk_CustomTitle"); if(st) document.getElementById("appTitle").innerText = st;    
document.getElementById('showPanelBtn').style.display = "block";
document.getElementById('builderPanel').style.display = "none";
   
if(micEnabled){

    setTimeout(()=>{

            startVoice();

    },1000);
}
     document.querySelectorAll('.widget').forEach(w => { let pos = JSON.parse(localStorage.getItem(w.id)); if(pos) { w.style.transform = `translate(${pos.x}px, ${pos.y}px)`; w.setAttribute('data-x', pos.x); w.setAttribute('data-y', pos.y); }});     
        let bg = localStorage.getItem('S_BG'); if(bg) document.body.style.backgroundImage = `url(${bg})`;     
        render(); renderHistory();    
document.querySelectorAll('.glass-card')    
.forEach(card => {    
    
let pos = JSON.parse(    
localStorage.getItem(card.id)    
);    
    
if(pos){    
    
card.style.transform =    
`translate(${pos.x}px, ${pos.y}px)`;    
    
card.setAttribute('data-x', pos.x);    
card.setAttribute('data-y', pos.y);    
    
}    
    
});    
    
interact('.glass-card').draggable({    
    
listeners: {    
    
move(event){    
    
if(isLocked) return;    
    
let target = event.target;    
    
let x =    
(parseFloat(target.getAttribute('data-x')) || 0)    
+ event.dx;    
    
let y =    
(parseFloat(target.getAttribute('data-y')) || 0)    
+ event.dy;    
    
target.style.transform =    
`translate(${x}px, ${y}px)`;    
    
target.setAttribute('data-x', x);    
target.setAttribute('data-y', y);    
    
},    
    
end(event){    
    
let target = event.target;    
    
localStorage.setItem(    
target.id,    
JSON.stringify({    
x: target.getAttribute('data-x'),    
y: target.getAttribute('data-y')    
})    
);    
    
}    
    
}    
    
});    
    
}; 
    
localStorage.removeItem("glass-card-3")

</script>    
</body>    
</html>
